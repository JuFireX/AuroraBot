package: im.polaris.diary
name: 日记
version: 1.0.0
brain_version: ">=4.1.0"
app_desc: >-
  这个应用负责把经历、互动和感受写成结构化日记。它是一个纯持久化写入应用，
  自己不做认知推理，但很适合与提醒、聊天记录整理等流程联动。
commands:
  - name: write_diary
    description: 写入结构化日记记录。
    parameters:
      date:
        type: string
        description: 日期，格式 YYYY-MM-DD
        required: true
      summary:
        type: string
        description: 当天总结
        required: true
      interactions:
        type: array
        description: 有意义的人际互动
        required: false
        items:
          type: string
      reflections:
        type: string
        description: 反思与感受
        required: false
    returns:
      saved:
        type: boolean
        description: 是否保存成功
      record_count:
        type: number
        description: 当前累计日记条数
    side_effects:
      - 会写入日记数据到本地存储
