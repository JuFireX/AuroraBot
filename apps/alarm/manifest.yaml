package: im.polaris.alarm
name: 时钟
version: 1.0.0
brain_version: ">=5.0.0"
app_desc: >-
  这个应用负责创建提醒和日记提示，并在到点时发出事件。它更像一个时序事件源，
  适合和消息、记录等其他应用联动；如果提醒携带 session_id，后续内核通常可以
  结合发送类命令把提醒发到对应目标。
tools:
  - name: set_alarm
    description: 设置一个会在未来触发的提醒。
    parameters:
      message:
        type: string
        description: 提醒内容
        required: true
      interval_seconds:
        type: number
        description: 距离当前时间的秒数
        required: false
      alarm_type:
        type: string
        description: 提醒类型，例如 generic 或 diary_prompt
        required: false
    returns:
      alarm_id:
        type: string
        description: 提醒 ID
      status:
        type: string
        description: 创建结果
    side_effects:
      - 会将提醒状态写入本地存储
