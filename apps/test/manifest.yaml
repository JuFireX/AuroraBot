package: im.polaris.test
name: 测试应用
version: 0.0.1
brain_version: ">=4.1.0"
app_desc: >-
  这个应用负责测试功能, 纯测试用.
commands:
  - name: test_command_a_plus_b
    description: 加法
    parameters:
      a:
        type: int
        description: 测试参数 a
        required: true
      b:
        type: int
        description: 测试参数 b
        required: true
    returns:
      success:
        type: boolean
        description: 是否计算成功
      res:
        type: number
        description: 计算结果
  - name: test_command_a_minus_b
    description: 减法
    parameters:
      a:
        type: int
        description: 测试参数 a
        required: true
      b:
        type: int
        description: 测试参数 b
        required: true
    returns:
      success:
        type: boolean
        description: 是否计算成功
      res:
        type: number
        description: 计算结果
