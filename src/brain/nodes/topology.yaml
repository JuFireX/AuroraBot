# 认知拓扑电路 — 邻接表配置
#
# 每个条目是一个节点实例。边由 watch/emit 的文件模式隐式形成：
#   节点 A 的 emit 匹配节点 B 的 watch → 存在有向边 A → B
#
# 字段：
#   id       — 全局唯一标识（同时也是 node.id）
#   type     — NODE_REGISTRY 中的类型名
#   enabled  — 是否启用（可选，默认 true）
#   watch    — 监听的文件 glob 列表（可选，覆盖节点类默认值）
#   emit     — 产出的文件路径列表（可选，覆盖节点类默认值）
#   config   — 节点类特定参数（可选）
#
# 相邻节点间靠文件模式匹配自动连边，无需显式声明上下游。

nodes:
  # ── 脉冲源 ──────────────────────────────────────
  - id: heartbeat
    type: heartbeat
    config:
      interval_sec: 300

  - id: goal-generator
    type: goal_generator
    config:
      cooldown_ticks: 6

  # ── 反射链路（短路径——直接响应） ──────────────
  - id: reflex
    type: reflex
    config:
      min_confidence: 0.7

  - id: reflex-learner
    type: reflex_learner
    config:
      cooldown_ticks: 12

  # ── 全链路（规划 → 展开 → 执行） ──────────────
  - id: planner
    type: planner

  - id: priority-switch
    type: switch
    config:
      guard_pattern: "plans/plan_*.json"
      condition_field: "priority"
      condition_op: ">"
      condition_value: 70
      true_trigger: "router/switch/urgent.trigger"
      false_trigger: "router/switch/normal.trigger"

  - id: expander
    type: expander

  - id: executor
    type: executor

  # ── 汇合与控制 ──────────────────────────────────
  - id: merge
    type: merge
    config:
      input_patterns:
        - "actions/action_*.json"
      output_path: "router/merge/merged.json"
      merge_strategy: "concat_array"

  - id: wait
    type: wait
    config:
      guard_pattern: "actions/action_*.json"
      condition_field: "status"
      condition_op: "=="
      condition_value: "done"
      ready_trigger: "router/wait/ready.trigger"

  # ── 记忆 ────────────────────────────────────────
  - id: memory
    type: memory

  # ── 示例节点（默认禁用） ──────────────────────
  - id: example
    type: example
    enabled: false
